<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Power Notify - Lịch Cúp Điện</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #facc15;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 {
    font-size: 1.6rem;
    text-align: center;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .btn-primary { background: var(--accent); color: #1e1b0a; }
  .btn-secondary { background: #334155; color: var(--text); }
  .status { font-size: 0.85rem; color: var(--muted); margin-top: 8px; text-align: center; }
  .status.on { color: var(--green); }
  .status.off { color: var(--red); }
  .entry {
    border-left: 3px solid var(--accent);
    padding: 10px 12px;
    margin-bottom: 10px;
    background: #0f1729;
    border-radius: 8px;
    font-size: 0.9rem;
  }
  .entry b { color: var(--accent); }
  .empty { text-align: center; color: var(--muted); padding: 20px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>⚡ Power Notify</h1>
  <div class="subtitle">
    Theo dõi lịch cúp điện<br/>
    Xã Phú An • Xã Tân Trung • Đường Cồn • Quốc lộ 80B
  </div>

  <div class="card">
    <button class="btn-primary" id="btnCheck">🔍 Kiểm tra lịch cúp điện</button>
    <div id="results"><div class="empty">Chưa có dữ liệu. Nhấn nút phía trên để kiểm tra.</div></div>
  </div>

  <div class="card">
    <button class="btn-secondary" id="btnSubscribe">🔔 Bật thông báo trên điện thoại</button>
    <div class="status" id="pushStatus">Trang sẽ tự động quét mỗi giờ và báo cho bạn nếu có lịch cúp điện trùng khu vực.</div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
