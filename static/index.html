<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Power Notify - Lịch Cúp Điện</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #facc15;
    --accent2: #38bdf8;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body {
    overflow-x: hidden;
    width: 100%;
    max-width: 100vw;
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px 16px 60px;
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  h1 { font-size: 1.5rem; text-align: center; margin: 0 0 4px; }
  .subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }

  /* Layout 2 cột trên desktop, 1 cột trên mobile */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto 16px;
  }
  .main-grid, .card, .entries-wrap, .entry { min-width: 0; }
  @media (max-width: 700px) {
    .main-grid { grid-template-columns: 1fr; }
    .col-mine { order: 1; }
    .col-all  { order: 2; }

    body { padding: 14px 10px 40px; }
    h1 { font-size: 1.2rem; }
    .subtitle { font-size: 0.75rem; margin-bottom: 14px; }

    .card { padding: 12px; border-radius: 12px; }
    .col-header { font-size: 0.72rem; padding-bottom: 6px; margin-bottom: 6px; }
    .badge { font-size: 0.65rem; padding: 1px 6px; }

    .entry { padding: 7px 9px; font-size: 0.78rem; border-radius: 7px; }
    .entry-meta { gap: 4px; }
    .status-badge { font-size: 0.65rem; padding: 2px 7px; }
    .countdown { font-size: 0.72rem; }

    .empty-safe { padding: 32px 12px 22px; }
    .empty-safe-icon { width: 54px; height: 54px; margin-bottom: 10px; }
    .empty-safe-text { font-size: 0.8rem; max-width: 190px; }

    .card-notify { padding: 11px 14px; gap: 10px; }
    button { padding: 8px 16px; font-size: 0.85rem; border-radius: 8px; }
    .status { font-size: 0.75rem; }

    .footer { font-size: 0.75rem; }
    #lastUpdated { font-size: 0.72rem; }
    .btn-share { padding: 7px 13px; font-size: 0.78rem; }
  }

  .col-header {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0 0 8px;
    margin-bottom: 8px;
    border-bottom: 2px solid;
  }
  .col-mine .col-header { color: var(--accent); border-color: var(--accent); }
  .col-all .col-header  { color: var(--accent2); border-color: var(--accent2); }

  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 16px;
    height: 100%;
    width: 100%;
    max-width: 100%;
  }
  .entries-wrap { max-height: 70vh; overflow-y: auto; overflow-x: hidden; width: 100%; }

  .entry {
    border-left: 3px solid var(--accent);
    padding: 8px 10px;
    margin-bottom: 8px;
    background: #0f1729;
    border-radius: 8px;
    font-size: 0.85rem;
    width: 100%;
    max-width: 100%;
  }
  .col-all .entry { border-left-color: var(--accent2); }
  .entry b { color: var(--accent); }
  .col-all .entry b { color: var(--accent2); }
  .countdown { color: var(--accent); font-size: 0.78rem; margin-top: 3px; }

  .entry-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 2px;
    min-width: 0;
  }
  .entry-meta > span:first-child {
    min-width: 0;
    overflow-wrap: anywhere;
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 99px;
    white-space: nowrap;
    letter-spacing: 0.01em;
    flex-shrink: 0;
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }
  .status-dot::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: inherit;
    animation: pulse-ring 1.4s ease-out infinite;
  }
  @keyframes pulse-ring {
    0%   { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(2.6); opacity: 0; }
  }
  .status-done .status-dot { background: #4ade80; }
  .status-approved .status-dot { background: #facc15; }
  /* Đã thực hiện: xanh lá - đã xong, an toàn */
  .status-badge.status-done {
    background: rgba(34, 197, 94, 0.15);
    color: #4ade80;
    border: 1px solid rgba(74, 222, 128, 0.5);
  }
  /* Đã duyệt: vàng cam - sắp diễn ra, cần chú ý */
  .status-badge.status-approved {
    background: rgba(250, 204, 21, 0.15);
    color: #facc15;
    border: 1px solid rgba(250, 204, 21, 0.5);
  }
  .empty { text-align: center; color: var(--muted); padding: 24px 0; font-size: 0.9rem; }

  .empty-safe {
    text-align: center;
    color: var(--muted);
    padding: 48px 16px 32px;
  }
  .empty-safe-icon {
    width: 72px;
    height: 72px;
    color: #334155;
    margin-bottom: 14px;
  }
  .empty-safe-text {
    font-size: 0.9rem;
    color: var(--muted);
    max-width: 220px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* Skeleton loading */
  .skeleton {
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 8px;
    background: #0f1729;
    border-left: 3px solid #1e293b;
  }
  .skeleton-line {
    height: 12px;
    border-radius: 4px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #1e293b 25%, #2c3b52 37%, #1e293b 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }
  .skeleton-line:last-child { margin-bottom: 0; }
  .skeleton-line.w-60 { width: 60%; }
  .skeleton-line.w-90 { width: 90%; }
  .skeleton-line.w-40 { width: 40%; }
  @keyframes shimmer {
    0%   { background-position: 100% 50%; }
    100% { background-position: 0 50%; }
  }

  /* Nút thông báo */
  .notify-bar {
    max-width: 1100px;
    margin: 0 auto;
  }
  .card-notify {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-secondary { background: var(--accent); color: #1e1b0a; }
  .btn-secondary:disabled { background: #4b5563; color: var(--muted); cursor: default; opacity: 0.8; }
  .status { font-size: 0.83rem; color: var(--muted); }
  .status.on { color: var(--green); }
  .status.off { color: var(--red); }
  .badge {
    display: inline-block;
    background: var(--accent);
    color: #1e1b0a;
    font-size: 0.7rem;
    font-weight: 700;
    border-radius: 99px;
    padding: 1px 7px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge-blue { background: var(--accent2); color: #0f172a; }
  .footer {
    max-width: 1100px;
    margin: 16px auto 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    padding: 0 4px;
  }
  #lastUpdated {
    color: var(--muted);
    font-size: 0.8rem;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4ade80;
    flex-shrink: 0;
    position: relative;
  }
  .live-dot::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: inherit;
    animation: pulse-ring 1.4s ease-out infinite;
  }
  .btn-share {
    padding: 8px 16px;
    background: #334155;
    color: var(--text);
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-share:active { opacity: 0.7; }

  /* Hiệu ứng chảy từ trên xuống khi tải trang */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .entry {
    animation: slideDown 0.4s ease both;
  }

  /* Hover phóng to nhẹ cho ô lịch */
  .entry {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: default;
  }
  .entry:hover {
    transform: scale(1.03);
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  }

  /* Hover cho nút chia sẻ và nút thông báo */
  .btn-share, .btn-secondary {
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .btn-share:hover, .btn-secondary:hover {
    transform: scale(1.06);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .btn-share:active, .btn-secondary:active {
    transform: scale(0.97);
  }
</style>
</head>
<body>
  <h1>⚡ Power Notify</h1>
  <div class="subtitle">Theo dõi lịch cúp điện • Huyện Phú Tân, An Giang</div>

  <div class="main-grid">
    <!-- Cột trái: toàn bộ huyện Phú Tân -->
    <div class="col-all">
      <div class="card">
        <div class="col-header">
          🗺️ Toàn huyện Phú Tân
          <span class="badge badge-blue" id="badgeAll">…</span>
        </div>
        <div class="entries-wrap">
          <div id="resultsAll">
            <div class="skeleton"><div class="skeleton-line w-60"></div><div class="skeleton-line w-90"></div><div class="skeleton-line w-40"></div></div>
            <div class="skeleton"><div class="skeleton-line w-60"></div><div class="skeleton-line w-90"></div><div class="skeleton-line w-40"></div></div>
            <div class="skeleton"><div class="skeleton-line w-60"></div><div class="skeleton-line w-90"></div><div class="skeleton-line w-40"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Cột phải: khu vực của tôi -->
    <div class="col-mine">
      <div class="card">
        <div class="col-header">
          📍 Khu vực của tôi
          <span class="badge" id="badgeMine">…</span>
        </div>
        <div class="entries-wrap">
          <div id="resultsMine">
            <div class="skeleton"><div class="skeleton-line w-60"></div><div class="skeleton-line w-90"></div><div class="skeleton-line w-40"></div></div>
            <div class="skeleton"><div class="skeleton-line w-60"></div><div class="skeleton-line w-90"></div><div class="skeleton-line w-40"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Thanh thông báo -->
  <div class="notify-bar">
    <div class="card-notify">
      <button class="btn-secondary" id="btnSubscribe">🔔 Bật thông báo</button>
      <div class="status" id="pushStatus">Tự động quét mỗi giờ, gửi thông báo khi có lịch cúp điện trùng khu vực của bạn.</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div id="lastUpdated"><span class="live-dot"></span>⏱ Đang tải...</div>
    <button class="btn-share" id="btnShare">🔗 Chia sẻ trang này</button>
    <div style="color:#475569; font-size:0.75rem;">Dữ liệu từ <a href="https://lichcupdien.org/lich-cup-dien-phu-tan-an-giang" target="_blank" style="color:#475569;">lichcupdien.org</a></div>
  </div>

<script src="/app.js"></script>
</body>
</html>
